name: Code Quality & Static Analysis

on:
  push:
    branches:
      - main
      - agentic-ide-production
    paths:
      - 'src/**'
      - 'include/**'
      - '.github/workflows/quality.yml'
  pull_request:
    branches:
      - main
      - agentic-ide-production
  workflow_dispatch:

jobs:
  # ============================================================
  # Static Code Analysis with Clang-Tidy
  # ============================================================
  clang-tidy-analysis:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild
        uses: microsoft/setup-msbuild@v1.3

      - name: Install LLVM/Clang
        shell: pwsh
        run: |
          choco install llvm -y --version=17.0.6
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install Qt
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64
          $QtBase = Join-Path $PWD "Qt\6.7.3\msvc2019_64"
          echo "Qt6_DIR=$QtBase" >> $env:GITHUB_ENV
          echo "$($QtBase)\bin" >> $env:GITHUB_PATH

      - name: Create .clang-tidy Config
        shell: pwsh
        run: |
          $config = @"
          ---
          Checks: |
            -readability-*,
            readability-identifier-naming,
            readability-magic-numbers,
            readability-const-return-type,
            clang-analyzer-*,
            cppcoreguidelines-*,
            performance-*,
            bugprone-*,
            concurrency-*,
            -cppcoreguidelines-pro-bounds-pointer-arithmetic,
            -cppcoreguidelines-owning-memory,
            -bugprone-easily-swappable-parameters
          HeaderFilterRegex: '(src|include)/.*'
          WarningsAsErrors: '*'
          CheckOptions:
            - { key: readability-identifier-naming.ClassCase, value: CamelCase }
            - { key: readability-identifier-naming.FunctionCase, value: camelCase }
            - { key: readability-identifier-naming.VariableCase, value: camelCase }
            - { key: readability-identifier-naming.PrivateMemberPrefix, value: 'm_' }
            - { key: readability-identifier-naming.ConstantCase, value: UPPER_CASE }
          "@
          
          $config | Out-File -FilePath ".clang-tidy"

      - name: Run Clang-Tidy Analysis
        shell: pwsh
        continue-on-error: true
        run: |
          $sourceFiles = @(
            "src/orchestration/agent_coordinator.cpp",
            "src/components/voice_processor.cpp",
            "src/components/ai_merge_resolver.cpp",
            "src/components/semantic_diff_analyzer.cpp",
            "src/components/zero_retention_manager.cpp",
            "src/components/sandboxed_terminal.cpp",
            "src/components/model_registry.cpp"
          )
          
          $issueCount = 0
          foreach ($file in $sourceFiles) {
            if (Test-Path $file) {
              Write-Host "🔍 Analyzing $file..."
              clang-tidy -checks=* $file -- -I include -std=c++20
              if ($LASTEXITCODE -ne 0) {
                $issueCount++
              }
            }
          }
          
          if ($issueCount -gt 0) {
            Write-Host "⚠️ Clang-Tidy found issues in $issueCount file(s)"
          }

      - name: Upload Analysis Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: .clang-tidy
          retention-days: 30

  # ============================================================
  # Compiler Warnings Check (MSVC /W4)
  # ============================================================
  compiler-warnings:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild
        uses: microsoft/setup-msbuild@v1.3

      - name: Install Qt
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64
          $QtBase = Join-Path $PWD "Qt\6.7.3\msvc2019_64"
          echo "Qt6_DIR=$QtBase" >> $env:GITHUB_ENV
          echo "$($QtBase)\bin" >> $env:GITHUB_PATH

      - name: Build with /W4 (All Warnings)
        shell: pwsh
        run: |
          mkdir build_warnings -Force
          cd build_warnings
          cmake -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_CXX_FLAGS="/W4 /WX" `
                -G "Visual Studio 17 2022" `
                -A x64 `
                ..
          
          $output = cmake --build . --config Release 2>&1
          $output | Out-File -FilePath "build_warnings.log"
          
          # Count warnings and errors
          $warningCount = ($output | Select-String -Pattern "warning" | Measure-Object).Count
          $errorCount = ($output | Select-String -Pattern "error" | Measure-Object).Count
          
          Write-Host "📊 Build Summary:"
          Write-Host "  Warnings: $warningCount"
          Write-Host "  Errors: $errorCount"
          
          if ($errorCount -gt 0) {
            Write-Error "Build failed with $errorCount errors"
            exit 1
          }

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiler-warnings-log
          path: build_warnings/build_warnings.log
          retention-days: 30

  # ============================================================
  # Complexity Analysis (Cyclomatic Complexity)
  # ============================================================
  complexity-analysis:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        shell: pwsh
        run: |
          pip install radon

      - name: Analyze Cyclomatic Complexity
        shell: pwsh
        run: |
          $sourceFiles = @(
            "src/orchestration/agent_coordinator.cpp",
            "src/components/voice_processor.cpp",
            "src/components/ai_merge_resolver.cpp",
            "src/components/semantic_diff_analyzer.cpp",
            "src/components/zero_retention_manager.cpp",
            "src/components/sandboxed_terminal.cpp",
            "src/components/model_registry.cpp"
          )
          
          $report = @()
          $report += "# Cyclomatic Complexity Report"
          $report += ""
          
          foreach ($file in $sourceFiles) {
            if (Test-Path $file) {
              Write-Host "📊 Analyzing complexity of $file..."
              radon cc $file --average --total | ForEach-Object { $report += $_ }
              $report += ""
            }
          }
          
          $report | Out-File -FilePath "complexity_report.md"
          Get-Content complexity_report.md

      - name: Upload Complexity Report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: complexity_report.md
          retention-days: 30

  # ============================================================
  # Security Scanning (SEMGREP)
  # ============================================================
  security-scan:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Semgrep
        shell: pwsh
        run: |
          pip install semgrep

      - name: Run Semgrep Security Scan
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "🔐 Running Semgrep security analysis..."
          
          semgrep --config=p/security-audit `
                  --config=p/owasp-top-ten `
                  --config=p/cwe-top-25 `
                  src/ include/ `
                  --json > semgrep_report.json
          
          $report = Get-Content semgrep_report.json | ConvertFrom-Json
          $issueCount = $report.results.Count
          
          Write-Host "🔐 Found $issueCount potential security issues"

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: semgrep_report.json
          retention-days: 30

  # ============================================================
  # Dependency Check
  # ============================================================
  dependency-check:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for Known Vulnerable Dependencies
        shell: pwsh
        run: |
          $dependencies = @(
            @{ name = "Qt"; version = "6.7.3"; minVersion = "6.5.0" },
            @{ name = "GGML"; source = "3rdparty/ggml" },
            @{ name = "GoogleTest"; source = "3rdparty/googletest" }
          )
          
          $report = @()
          $report += "# Dependency Check Report"
          $report += ""
          
          foreach ($dep in $dependencies) {
            $report += "## $($dep.name)"
            
            if ($dep.PSObject.Properties.Name -contains "version") {
              $report += "- Version: $($dep.version)"
              $report += "- Minimum: $($dep.minVersion)"
              $report += "- Status: ✅ OK"
            } else {
              $pathExists = Test-Path $dep.source
              $report += "- Source: $($dep.source)"
              $report += "- Status: $(if ($pathExists) { '✅ Present' } else { '❌ Missing' })"
            }
            $report += ""
          }
          
          $report | Out-File -FilePath "dependency_report.md"
          Get-Content dependency_report.md

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency_report.md
          retention-days: 30

  # ============================================================
  # Code Quality Summary
  # ============================================================
  quality-summary:
    runs-on: windows-latest
    needs: [
      clang-tidy-analysis,
      compiler-warnings,
      complexity-analysis,
      security-scan,
      dependency-check
    ]
    if: always()
    
    steps:
      - name: Generate Quality Report
        shell: pwsh
        run: |
          $summary = @"
          # 📊 Code Quality Analysis Summary
          
          | Check | Status |
          |-------|--------|
          | Clang-Tidy | ${{ needs.clang-tidy-analysis.result }} |
          | Compiler Warnings (/W4) | ${{ needs.compiler-warnings.result }} |
          | Complexity Analysis | ${{ needs.complexity-analysis.result }} |
          | Security Scan | ${{ needs.security-scan.result }} |
          | Dependency Check | ${{ needs.dependency-check.result }} |
          
          **Overall Status**: ${{ (needs.clang-tidy-analysis.result == 'success' && needs.compiler-warnings.result == 'success') && '✅ PASSED' || '⚠️ NEEDS REVIEW' }}
          
          All reports available in Artifacts.
          "@
          
          Write-Host $summary

      - name: Comment Quality Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const summary = `
            # 📊 Code Quality Check
            
            - ✅ Clang-Tidy: ${{ needs.clang-tidy-analysis.result }}
            - ✅ Compiler Warnings: ${{ needs.compiler-warnings.result }}
            - ✅ Complexity: ${{ needs.complexity-analysis.result }}
            - 🔐 Security: ${{ needs.security-scan.result }}
            - 📦 Dependencies: ${{ needs.dependency-check.result }}
            
            **Details** available in Artifacts → quality reports.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
